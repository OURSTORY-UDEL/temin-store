<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temin Store</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #f9f9f9; }
        .iframe-container {
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            /* Trik ajaib: Tinggi ditambahin, lalu margin ditarik ke atas buat nutupin banner biru */
            height: calc(100vh + 40px); 
            border: none;
            margin-top: -40px; 
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <!-- GANTI TULISAN DI BAWAH DENGAN LINK GOOGLE SCRIPT LU -->
        <iframe src="https://script.google.com/macros/s/AKfycbyfE0x2EKHrfidJyBiSB5BDhKjk3u1YJbwtEGLTD33zFl1Y33D49Y-1QUiAERjoPArumg/exec?page=storefront"></iframe>
    </div>
</body>
</html>
